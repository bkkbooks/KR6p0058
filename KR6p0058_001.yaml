body:
  text: 或問淨土之說蓋表法耳智人宜直悟禪宗而今只管讚說淨土將無執著事相不明理性答歸元性無二方便有多門曉得此意禪宗淨土殊途同歸子之所疑當下氷釋昔人於此遞互闡揚不一而足如中峰大師道禪者淨土之禪淨土者禪之淨土而修之者必貴一門深入此數語尤萬世不易之定論也故大勢至菩薩得念佛三昧而曰以念佛心入無生忍普賢菩薩入華嚴不思議解脫而曰願命終時生安樂剎是二大士一侍娑婆教主一侍安養導師宜應各立門戶而乃和會圓融兩不相礙此皆人所常聞習知那得尚執偏見且爾云淨土表法者豈不以淨心即是淨土豈復更有七寶世界則亦將謂善心即是天堂豈復更有夜摩忉利惡心即是地獄豈復更有刀劍鑊湯愚癡心即是畜生豈復更有披毛帶角等耶又爾喜談理性厭說事相都緣要顯我是高流怕人說我不通理性噫若真是理性洞明便知事外無理相外無性本自交徹何須定要捨事求理離相覓性況土分四種汝謂只有寂光土更無實報莊嚴等土乎哉若一味說無相話以為高則資性稍利者看得兩本經論記得幾則公案即便能之何足為難且汝既了徹自心隨處淨土吾試問汝還肯即廁溷中作住止否還肯就犬豕馬牛同槽而飲噉否還肯入丘冢與臭腐尸骸同睡眠否還肯洗摩飼哺伽摩羅疾膿血屎尿諸惡疾人積月纍年否於斯數者歡喜安隱略不介意許汝說高山平地總西方其或外為忍勉內起疑嫌則是淨穢之境未空憎愛之情尚在而乃開口高談大聖人過量境界撥無佛國蔑視往生可謂欺天誑人甘心自昧苦哉苦哉又汝若有大力量有大誓願願於生死海中頭出頭沒行菩薩行更無畏怯則淨土之生吾不汝強汝或慮此土境風浩大作主不得慮諸佛出世難值修學無繇慮忍力未固不能於三界險處度脫衆生慮盡此報身未能永斷生死不受後有慮後有既在捨身受身前路茫茫未知攸往則棄淨土而不生其失非細此淨土法門似淺而深似近而遠似難而易似易而難他日汝當自知汝今參禪念佛不妨隨便一門深入但忌認鍮作金得少為足便似管窺小解恣意妄談非詆淨土喻如癡狂之子罵斥父母父母慈憐雖不加責其如天理之不容王法之必戮何彼妄談者報亦如是可懼也夫可悲也夫淨土疑辨後跋微休居士鳴道學於靖江有武城弦歌之風既致政勵精華嚴鏤梵本為方冊以便讀學而復弘贊淨土刻豫所著疑辨廣為流通夫尚志十玄之門捿神九蓮之域可謂深契普賢願王妙入毗盧性海者矣惜早逝不令曹魯川見之
