body:
  text: 淨土疑辨序豫章微休居士陳所蘊撰蓮池禪師作淨土疑辨摧慢幢破癡網如闇得燈如貧得寶真渡苦海之慈航哉即天台永明之論未有若此之精切而著明者也修淨土者最宜服膺或疑未後戒彼恣意妄談貽苦報於無盡其言得無已甚乎余曰非已甚也甞考唐房翥暴卒至冥間見王王曰據案簿君曾勸一老人念佛已生淨土君承此福亦合生淨土遂放還呂師說云闡提之輩不信有西方不能自修又障他人修入地獄如箭射夫一口業也勸人念佛亦令生淨土障人念佛入地獄如箭射恣口業者其真可懼也哉故曰蓮池禪師之言非已甚也序畢
